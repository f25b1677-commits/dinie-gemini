<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Integration & Area Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col font-sans">

    <header class="border-b border-slate-800 p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight text-indigo-400">∫ Riemann Grapher</h1>
        <span class="text-sm text-slate-400">Inspired by Desmos</span>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <div class="w-full md:w-96 border-r border-slate-800 p-6 flex flex-col gap-6 overflow-y-auto bg-slate-950/40">
            
            <div class="flex flex-col gap-2">
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Function f(x)</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-serif italic text-lg">f(x) =</span>
                    <input type="text" id="expression" value="x^2 - 2x + 1" 
                           class="w-full pl-14 pr-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 font-mono text-lg transition shadow-inner">
                </div>
                <p id="error-msg" class="text-xs text-rose-400 hidden mt-1"></p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Lower Limit (a)</label>
                    <input type="number" id="limit-a" value="0" step="any"
                           class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 font-mono text-lg transition">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Upper Limit (b)</label>
                    <input type="number" id="limit-b" value="3" step="any"
                           class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 font-mono text-lg transition">
                </div>
            </div>

            <hr class="border-slate-800 my-2">

            <div class="bg-gradient-to-br from-indigo-950/50 to-slate-900 border border-indigo-500/30 rounded-2xl p-5 shadow-lg relative overflow-hidden">
                <div class="absolute -right-6 -bottom-6 text-indigo-500/10 text-8xl font-serif select-none pointer-events-none">∫</div>
                <span class="text-xs font-semibold uppercase tracking-wider text-indigo-400">Definite Integral Result</span>
                <div class="mt-3 font-serif text-3xl font-bold tracking-tight flex items-baseline gap-1">
                    <span class="text-xl text-slate-400 font-normal">Area =</span>
                    <span id="result-display" class="text-indigo-300">0.00</span>
                </div>
                <p class="text-[10px] text-slate-500 mt-2 font-mono">Calculated via Simpson's 1/3 Rule (n=1000)</p>
            </div>

            <div class="flex flex-col gap-2 mt-auto">
                <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Graph Settings</label>
                <button id="reset-view" class="w-full py-2 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 rounded-xl text-sm font-medium transition cursor-pointer">
                    Center & Reset View
                </button>
            </div>
        </div>

        <div class="flex-1 bg-slate-950 relative flex items-center justify-center p-4">
            <canvas id="graphCanvas" class="w-full h-full max-h-[85vh]"></canvas>
        </div>
    </main>

    <script>
        // DOM Elements
        const exprInput = document.getElementById('expression');
        const inputA = document.getElementById('limit-a');
        const inputB = document.getElementById('limit-b');
        const resultDisplay = document.getElementById('result-display');
        const errorMsg = document.getElementById('error-msg');
        const btnReset = document.getElementById('reset-view');
        const ctx = document.getElementById('graphCanvas').getContext('2d');

        let chart;

        // --- Core Math Functions ---

        // Numerical Integration using Simpson's 1/3 Rule
        function simpsonsRule(compiledExpr, a, b, n = 1000) {
            if (n % 2 !== 0) n++; // n must be even
            const h = (b - a) / n;
            
            let sum = compiledExpr.evaluate({ x: a }) + compiledExpr.evaluate({ x: b });
            
            for (let i = 1; i < n; i++) {
                const x = a + i * h;
                const fx = compiledExpr.evaluate({ x: x });
                sum += (i % 2 === 0) ? 2 * fx : 4 * fx;
            }
            
            return (h / 3) * sum;
        }

        // Generate data arrays for plotting
        function generateGraphData(compiledExpr, minX, maxX, step) {
            const points = [];
            for (let x = minX; x <= maxX; x += step) {
                try {
                    const y = compiledExpr.evaluate({ x: x });
                    if (typeof y === 'number' && !isNaN(y) && isFinite(y)) {
                        points.push({ x: x, y: y });
                    }
                } catch (e) {
                    // Skip mathematical discontinuities (e.g., division by zero)
                }
            }
            return points;
        }

        // --- Chart/Graph Management ---

        function initChart() {
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        {
                            label: 'f(x)',
                            data: [],
                            borderColor: '#818cf8', // indigo-400
                            borderWidth: 3,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.1,
                            z: 2
                        },
                        {
                            label: 'Area Under Curve',
                            data: [],
                            backgroundColor: 'rgba(129, 140, 248, 0.25)', // Shaded indigo
                            borderColor: 'transparent',
                            pointRadius: 0,
                            fill: 'origin', // Fills down to the x-axis (y=0)
                            z: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'center', // Centers the axis at y=0 if possible
                            grid: { color: '#334155' }, // slate-700
                            ticks: { color: '#94a3b8' } // slate-400
                        },
                        y: {
                            type: 'linear',
                            position: 'center', // Centers the axis at x=0 if possible
                            grid: { color: '#334155' },
                            ticks: { color: '#94a3b8' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // --- Controller / Update Loop ---

        function updateGraph() {
            errorMsg.classList.add('hidden');
            const exprString = exprInput.value;
            const a = parseFloat(inputA.value);
            const b = parseFloat(inputB.value);

            if (isNaN(a) || isNaN(b)) return;

            try {
                // Parse and compile expression with math.js
                const compiledExpr = math.compile(exprString);
                
                // 1. Calculate the Integral
                const area = simpsonsRule(compiledExpr, a, b);
                resultDisplay.textContent = area.toFixed(5);

                // 2. Determine Viewport Window Bounds (Dynamic based on limits)
                const margin = Math.abs(b - a) * 0.5 || 5; 
                const minX = Math.min(a, b) - margin;
                const maxX = Math.max(a, b) + margin;
                const step = (maxX - minX) / 300; // Resolution

                // 3. Populate Primary Function Dataset
                const mainFunctionPoints = generateGraphData(compiledExpr, minX, maxX, step);
                
                // 4. Populate Shaded Integral Area Dataset (Restricted strictly between a and b)
                const integralStep = (b - a) / 200;
                const shadedPoints = generateGraphData(compiledExpr, a, b, integralStep);

                // Ensure the shading connects nicely to the bounds even if step sizing cuts short
                if(shadedPoints.length > 0) {
                     shadedPoints.unshift({x: a, y: compiledExpr.evaluate({x: a})});
                     shadedPoints.push({x: b, y: compiledExpr.evaluate({x: b})});
                }

                // Update Chart JS state
                chart.data.datasets[0].data = mainFunctionPoints;
                chart.data.datasets[1].data = shadedPoints;

                // Adjust window limits dynamically if not dragged out by user
                chart.options.scales.x.min = minX;
                chart.options.scales.x.max = maxX;

                chart.update();

            } catch (error) {
                errorMsg.textContent = "Invalid Expression Syntax";
                errorMsg.classList.remove('hidden');
            }
        }

        // --- Event Listeners ---
        [exprInput, inputA, inputB].forEach(element => {
            element.addEventListener('input', updateGraph);
        });

        btnReset.addEventListener('click', () => {
            inputA.value = 0;
            inputB.value = 3;
            exprInput.value = "x^2 - 2x + 1";
            updateGraph();
        });

        // Initialize on mount
        initChart();
        updateGraph();
    </script>
</body>
</html>
